<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pregunta 2</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
background:white;
max-width:900px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

#score{
font-size:30px;
font-weight:bold;
margin-bottom:30px;
color:#003366;
}

button{
width:90%;
padding:15px;
margin:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
background:#006699;
color:white;
}

button:hover{
background:#004466;
}

#feedback{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div id="score">⭐ Puntaje: 0</div>

<h2>Los procedimientos de evaluación deben ser conocidos por los estudiantes desde el inicio del período académico.</h2>

<button onclick="verificar(0)">
Verdadero
</button>

<button onclick="verificar(1)">
Falso
</button>

<div id="feedback"></div>

</div>

<script>

let puntaje = localStorage.getItem("puntaje");

if(puntaje == null){
puntaje = 0;
}

puntaje = parseInt(puntaje);

const correcta = 0;

document.getElementById("score").innerHTML =
"⭐ Puntaje: " + puntaje;

function verificar(i){

let botones =
document.querySelectorAll("button");

botones.forEach(btn=>{
btn.disabled = true;
btn.style.opacity = 0.6;
});

if(i == correcta){

puntaje += 10;

document.getElementById("feedback").innerHTML =
"✅ Correcto +10";

}
else{

puntaje -= 10;

if(puntaje < 0){
puntaje = 0;
}

document.getElementById("feedback").innerHTML =
"❌ Incorrecto -10";

}

localStorage.setItem("puntaje", puntaje);

document.getElementById("score").innerHTML =
"⭐ Puntaje: " + puntaje;

}

</script>

</body>
</html>
