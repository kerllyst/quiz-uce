<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz UCE</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f5f5f5;
    padding:40px;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

#score{
    font-size:35px;
    margin-bottom:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="score">Puntaje: 0</div>

<h2>¿Cuál es el objetivo principal de las normas disciplinarias?</h2>

<button onclick="correcta()">
Garantizar convivencia e integridad académica
</button>

<button onclick="incorrecta()">
Incrementar sanciones
</button>

<button onclick="incorrecta()">
Limitar participación estudiantil
</button>

<script>

let puntaje = 0;

function correcta(){
    puntaje += 10;
    actualizar();
}

function incorrecta(){
    puntaje -= 10;

    if(puntaje < 0){
        puntaje = 0;
    }

    actualizar();
}

function actualizar(){
    document.getElementById("score").innerHTML =
    "Puntaje: " + puntaje;
}

</script>

</body>
</html>
